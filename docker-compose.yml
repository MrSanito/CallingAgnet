# ╔══════════════════════════════════════════════════════════════════════════╗
# ║  Rentopus — Docker Compose Stack                                       ║
# ║  Run: docker-compose up --build                                        ║
# ║  All API keys are read from the root .env file                         ║
# ╚══════════════════════════════════════════════════════════════════════════╝

name: rentopus   # ← pins project name so volumes survive folder renames

services:
  # ────────────────────────────────────────────────────────────────────────
  #  REDIS — Task Queue Storage for BullMQ
  # ────────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: rentopus-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - rentopus-network
    restart: unless-stopped

  # ────────────────────────────────────────────────────────────────────────
  #  MONGODB — Database Storage
  # ────────────────────────────────────────────────────────────────────────
  mongodb:
    image: mongo:7.0
    container_name: rentopus-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    networks:
      - rentopus-network
    restart: unless-stopped

  # ────────────────────────────────────────────────────────────────────────
  #  CALL SCHEDULER BACKEND — Express API Server (port 6002)
  # ────────────────────────────────────────────────────────────────────────
  call-scheduler:
    build:
      context: ./callScheduler
      dockerfile: Dockerfile
    container_name: rentopus-backend
    ports:
      - "6002:6002"
    env_file:
      - ./.env
    environment:
      - NODE_ENV=production
      - PORT=6002
      - REDIS_URL=redis://redis:6379
      - MONGODB_URI=mongodb://mongodb:27017/call_scheduler
    depends_on:
      - redis
      - mongodb
    networks:
      - rentopus-network
    restart: unless-stopped

  # ────────────────────────────────────────────────────────────────────────
  #  CALL SCHEDULER WORKER — Background Queue Processor
  # ────────────────────────────────────────────────────────────────────────
  call-scheduler-worker:
    build:
      context: ./callScheduler
      dockerfile: Dockerfile
    container_name: rentopus-worker
    command: ["npm", "run", "start:worker"]
    env_file:
      - ./.env
    environment:
      - NODE_ENV=production
      - REDIS_URL=redis://redis:6379
      - MONGODB_URI=mongodb://mongodb:27017/call_scheduler
    depends_on:
      - redis
      - mongodb
    networks:
      - rentopus-network
    restart: unless-stopped

  # ────────────────────────────────────────────────────────────────────────
  #  CALL SCHEDULER WEB — Next.js Frontend Dashboard (port 6001)
  # ────────────────────────────────────────────────────────────────────────
  call-scheduler-web:
    build:
      context: ./call-scheduler-web
      dockerfile: Dockerfile
    container_name: rentopus-frontend
    ports:
      - "6001:6001"
    env_file:
      - ./.env
    environment:
      - NODE_ENV=production
      - PORT=6001
      - NEXT_PUBLIC_API_URL=http://localhost:6002/api/v1
      - MONGODB_URI=mongodb://mongodb:27017/call_scheduler
    depends_on:
      - call-scheduler
      - mongodb
    networks:
      - rentopus-network
    restart: unless-stopped

# ──────────────────────────────────────────────────────────────────────────
#  NETWORK — single private LAN for all services
# ──────────────────────────────────────────────────────────────────────────
networks:
  rentopus-network:
    driver: bridge

# ──────────────────────────────────────────────────────────────────────────
#  VOLUMES — only redis and mongodb as requested
# ──────────────────────────────────────────────────────────────────────────
volumes:
  redis_data:       # Redis queue data — survives docker-compose down
  mongodb_data:     # MongoDB collections — survives docker-compose down
  mongodb_config:   # MongoDB config & indexes — survives docker-compose down