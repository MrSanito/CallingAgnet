services:
  # ────────────────────────────────────────────────────────────────────────────
  #  REDIS — Task Queue Storage for BullMQ
  # ────────────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: rentopus-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  # ────────────────────────────────────────────────────────────────────────────
  #  MONGODB — Database Storage for Call Scheduler
  # ────────────────────────────────────────────────────────────────────────────
  mongodb:
    image: mongo:7.0
    container_name: rentopus-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped

  # ────────────────────────────────────────────────────────────────────────────
  #  CALL SCHEDULER BACKEND — Express API Server
  # ────────────────────────────────────────────────────────────────────────────
  call-scheduler:
    build:
      context: ./callScheduler
      dockerfile: Dockerfile
    container_name: rentopus-backend
    ports:
      - "6000:6000"
    environment:
      - NODE_ENV=production
      - REDIS_URL=redis://redis:6379
      - PORT=6000
      # Sourced from local .env or injected environment variables
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - VIDEOSDK_AUTH_TOKEN=${VIDEOSDK_AUTH_TOKEN}
      - VIDEOSDK_SIP_CALL_FROM=${VIDEOSDK_SIP_CALL_FROM}
      - VIDEOSDK_ROUTING_RULE_ID=${VIDEOSDK_ROUTING_RULE_ID}
      - MONGODB_URI=${MONGODB_URI}
      - VIDEOSDK_WEBHOOK_URL=${VIDEOSDK_WEBHOOK_URL}
      - RCRM_API_KEY=${RCRM_API_KEY}
    depends_on:
      - redis
      - mongodb
    restart: unless-stopped

  # ────────────────────────────────────────────────────────────────────────────
  #  CALL SCHEDULER WORKER — Background Queue Task Worker
  # ────────────────────────────────────────────────────────────────────────────
  call-scheduler-worker:
    build:
      context: ./callScheduler
      dockerfile: Dockerfile
    container_name: rentopus-worker
    command: ["npm", "run", "start:worker"]
    environment:
      - NODE_ENV=production
      - REDIS_URL=redis://redis:6379
      # Sourced from local .env or injected environment variables
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - VIDEOSDK_AUTH_TOKEN=${VIDEOSDK_AUTH_TOKEN}
      - VIDEOSDK_SIP_CALL_FROM=${VIDEOSDK_SIP_CALL_FROM}
      - VIDEOSDK_ROUTING_RULE_ID=${VIDEOSDK_ROUTING_RULE_ID}
      - MONGODB_URI=${MONGODB_URI}
      - VIDEOSDK_WEBHOOK_URL=${VIDEOSDK_WEBHOOK_URL}
      - RCRM_API_KEY=${RCRM_API_KEY}
    depends_on:
      - redis
      - mongodb
    restart: unless-stopped

  # ────────────────────────────────────────────────────────────────────────────
  #  CALL SCHEDULER WEB — Next.js Frontend Dashboard
  # ────────────────────────────────────────────────────────────────────────────
  call-scheduler-web:
    build:
      context: ./call-scheduler-web
      dockerfile: Dockerfile
    container_name: rentopus-frontend
    ports:
      - "6001:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://localhost:6000/api/v1
      - MONGODB_URI=${MONGODB_URI}
    depends_on:
      - call-scheduler
      - mongodb
    restart: unless-stopped

volumes:
  redis_data:
  mongodb_data:
